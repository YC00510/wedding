<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wedding Invitation</title>

<link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgm" autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="music-btn" id="musicBtn">♫</div>

<!-- ✉️ OPENING -->
<div class="opening" id="opening">
  <div class="envelope"></div>
  <h1>YOU ARE INVITED</h1>
</div>

<!-- 🎬 HERO -->
<section class="hero">
  <div class="overlay"></div>

  <div class="hero-content reveal">
    <h1>WE ARE GETTING MARRIED</h1>
    <h2>Ping & Yuchi</h2>
    <p>2027.03.20</p>
  </div>
</section>

<!-- INVITE -->
<section class="section reveal">
  <h2>Invitation</h2>
  <p>誠摯邀請您參與我們的重要時刻</p>
</section>

<!-- INFO -->
<section class="card reveal">
  <h2>Wedding Details</h2>
  <p>Date: 2027.03.20</p>
  <p>Time: 11:30</p>
  <p>Venue: ○○會館</p>
</section>

<!-- CINEMA STORY -->
<section class="cinema reveal"></section>

<section class="section reveal">
  <h2>Our Journey</h2>
  <p>Every moment leads us here.</p>
</section>

<!-- GALLERY -->
<section class="gallery reveal">
  <img src="https://files.catbox.moe/8ucxa3.JPG"/>
  <img src="https://files.catbox.moe/8ucxa3.JPG"/>
  <img src="https://files.catbox.moe/8ucxa3.JPG"/>
</section>

<!-- RSVP -->
<section class="card reveal">
  <h2>RSVP</h2>
  <a class="btn" href="https://forms.google.com">
    I will attend
  </a>
</section>

<footer class="reveal">
  Thank you for being part of our story
</footer>

<script src="script.js"></script>
</body>
</html>
